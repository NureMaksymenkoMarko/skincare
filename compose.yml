version: "3"

services:
  app:
    build: .
    container_name: skincare-app
    ports:
      - "${APP_PORT}:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - SECRET_KEY=${SECRET_KEY}
      - TOKEN_MAX_AGE=${TOKEN_MAX_AGE}
    depends_on:
      - db
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - skincare-network

  db:
    image: postgres:13
    container_name: skincare-db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - skincare-db-data:/var/lib/postgresql/data
    networks:
      - skincare-network

networks:
  skincare-network:
    driver: bridge

volumes:
  skincare-db-data: